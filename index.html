<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Level Up! (Letter Recognition)</title>
    <style>
        :root { --pink: #f8a5c2; --blue: #778beb; --bg: #fffbe6; --gold: #feca57; }
        body { font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif; background-color: var(--bg); text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; padding: 25px; background: white; border-radius: 40px; box-shadow: 0 15px 0 #f0e68c; min-height: 90vh; position: relative; }
        
        /* 標題與星星 */
        .header { color: #54a0ff; font-size: 32px; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px #e3f2fd; }
        .sub-title { color: #888; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .stars { font-size: 40px; color: var(--gold); margin-bottom: 15px; min-height: 50px; }
        .victory-glow { animation: victoryPulse 1s infinite alternate; }
        @keyframes victoryPulse { from { transform: scale(1); } to { transform: scale(1.2); text-shadow: 0 0 20px #feca57; } }

        /* 核心圓圈按鈕（只顯示單個大寫字母） */
        .choice-container { display: flex; justify-content: space-around; align-items: center; margin: 40px 0; }
        .circle-btn { width: 160px; height: 160px; border-radius: 50%; border: none; font-size: 70px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 10px 0 rgba(0,0,0,0.1); }
        .circle-btn.pink { background-color: var(--pink); }
        .circle-btn.blue { background-color: var(--blue); }
        .circle-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 rgba(0,0,0,0.1); }

        /* 答對後顯示的單字（給媽媽看或給孩子耳濡目染） */
        #big-word { font-size: 55px; color: #1dd1a1; font-weight: bold; margin: 15px 0; text-transform: uppercase; }

        /* 控制按鈕區 */
        .action-area { margin-top: 20px; background: #f9f9f9; border-radius: 20px; padding: 20px; }
        .action-btn { border-radius: 40px; border: none; padding: 15px 30px; font-size: 20px; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; font-weight: bold; }
        .rec-btn { background-color: #ff6b6b; box-shadow: 0 4px #ee5253; }
        .play-btn { background-color: #1dd1a1; box-shadow: 0 4px #10ac84; }
        .recording-text { color: #ff6b6b; font-weight: bold; margin: 10px; font-size: 20px; display: none; }

        /* 選單網格 */
        .menu-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .letter-item { padding: 18px; background: #BBDEFB; color: #1976D2; border-radius: 18px; cursor: pointer; font-weight: bold; font-size: 26px; box-shadow: 0 4px #90CAF9; }
        .letter-item:active { transform: translateY(3px); box-shadow: none; }

        .hidden { display: none !important; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-view">
        <h2 class="header">LEVEL UP! 🚀</h2>
        <p class="sub-title">PICK A LETTER TO START!</p>
        <div id="menu" class="menu-grid"></div>
    </div>

    <div id="game-view" class="hidden">
        <div class="header">Phonics Level Up!</div>
        <div class="stars" id="star-display">☆☆☆☆☆</div>

        <button onclick="playSound()" style="background:white; border:3px solid #54a0ff; color:#54a0ff; border-radius:30px; padding:10px 25px; cursor:pointer; font-weight:bold; font-size: 20px;">🔊 LISTEN</button>

        <div class="choice-container">
            <button id="opt1" class="circle-btn pink" onclick="checkAnswer(this)"></button>
            <button id="opt2" class="circle-btn blue" onclick="checkAnswer(this)"></button>
        </div>

        <div id="recording-status" class="recording-text blink">🔴 RECORDING...</div>

        <div id="feedback-area" class="hidden">
            <div id="big-word"></div>
            <div class="action-area">
                <button id="recBtn" class="action-btn rec-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()">🎤 HOLD TO RECORD</button>
                <button id="playRecBtn" class="action-btn play-btn hidden" onclick="playBack()">▶ MY VOICE</button>
            </div>
            <button onclick="nextRound()" style="margin-top:30px; border:none; background:#54a0ff; color:white; border-radius:25px; padding:12px 40px; font-size:22px; cursor:pointer; font-weight:bold; box-shadow: 0 5px #2e86de;">NEXT ➔</button>
        </div>
        
        <button onclick="location.reload()" style="margin-top:50px; color:gray; background:none; border:none; cursor:pointer; font-size: 16px; font-weight: bold;">⬅ BACK TO MENU</button>
    </div>
</div>

<script>
    // 完整的 26 字母單字庫
    const phonicsData = {
        A:["ant","alligator","arrow","apple","ax"], B:["bee","bear","boy","bike","bus","boat","bird"],
        C:["cat","cap","cup","cake","cow","computer","camera","caterpillar"], D:["dog","door","duck","deer","donkey","dinosaur"],
        E:["egg","elf","eggplant","elephant","elk"], F:["fish","fan","five","frog","fox","fruit"],
        G:["goat","girl","goose","gift","gum","gorilla"], H:["hat","horse","hen","house","happy","hand","hippo","hut"],
        I:["ink","in","igloo","iguana","insect","indian"], J:["jam","juice","jeep","jet","jungle","jellyfish"],
        K:["kite","key","kit","king","kangaroo","koala"], L:["lion","lamp","leaf","lake","love","line","ladybug","lemon"],
        M:["mouse","monkey","moon","milk","mitten","map"], N:["nut","net","nose","nurse","number","nest","nine"],
        O:["ox","olive","on","octopus","otter","ostrich"], P:["pig","pen","pan","papaya","penguin","peas","piano","pizza","puppy"],
        Q:["queen","quilt","quick","quiet","quarter","quiz"], R:["run","rock","rabbit","robot","rose","rat","red","room"],
        S:["sun","socks","soup","snail","star","snake","sea","sandwich"], T:["tiger","top","turtle","ten","train","taxi","tomato","tent"],
        U:["up","under","uncle","umbrella","underwear"], V:["vase","van","vet","vest","volcano","violin"],
        W:["witch","window","water","watermelon","wolf","watch","well","wagon"], X:["box","fox","mix","six","T-rex"],
        Y:["yolk","yo-yo","yes","yawn","yellow","yogurt","yarn"], Z:["zoo","zebra","zipper","zero"]
    };

    let currentLetter = '', currentTarget = '', score = 0, mediaRecorder, audioChunks = [], audioUrl;

    // 建立大寫選單
    const menu = document.getElementById('menu');
    Object.keys(phonicsData).forEach(l => {
        let div = document.createElement('div');
        div.className = 'letter-item'; div.innerText = l;
        div.onclick = () => { currentLetter = l; document.getElementById('menu-view').classList.add('hidden'); document.getElementById('game-view').classList.remove('hidden'); nextRound(); };
        menu.appendChild(div);
    });

    function nextRound() {
        const words = phonicsData[currentLetter];
        currentTarget = words[Math.floor(Math.random() * words.length)];
        
        // 隨機抓一個「別的字母」當作干擾的選項
        const others = Object.keys(phonicsData).filter(l => l !== currentLetter);
        const distractorLetter = others[Math.floor(Math.random() * others.length)];

        // 選項只放「大寫字母」本身！
        const options = [currentLetter, distractorLetter].sort(() => Math.random() - 0.5);
        document.getElementById('opt1').innerText = options[0];
        document.getElementById('opt2').innerText = options[1];
        
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('playRecBtn').classList.add('hidden');
        document.getElementById('recording-status').style.display = 'none';
        document.getElementById('star-display').classList.remove('victory-glow');
        updateStars();
        playSound(); // 自動播放單字聲音
    }

    function playSound() { speak(currentTarget); }
    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.75; window.speechSynthesis.speak(m); }

    function checkAnswer(el) {
        // 如果點選的大寫字母等於當前關卡的字母
        if (el.innerText === currentLetter) {
            score++;
            updateStars();
            document.getElementById('big-word').innerText = currentTarget; // 答對才秀出完整大寫單字
            document.getElementById('feedback-area').classList.remove('hidden');
            if (score > 0 && score % 5 === 0) {
                document.getElementById('star-display').classList.add('victory-glow');
                playVictoryMusic();
            } else {
                playSimpleDing();
            }
        } else {
            speak("Try again");
            el.style.backgroundColor = "#eee";
        }
    }

    function updateStars() {
        let s = (score % 5 === 0 && score !== 0) ? 5 : score % 5;
        document.getElementById('star-display').innerText = "★".repeat(s) + "☆".repeat(5-s);
    }

    function playVictoryMusic() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const melody = [
            {f: 523, d: 0.15}, {f: 523, d: 0.15}, {f: 523, d: 0.15}, {f: 523, d: 0.4},
            {f: 415, d: 0.4}, {f: 466, d: 0.4}, {f: 523, d: 0.2}, {f: 466, d: 0.15}, {f: 523, d: 1.0}
        ];
        let now = ctx.currentTime;
        melody.forEach(n => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = 'square'; o.frequency.value = n.f; o.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.001, now + n.d);
            o.start(now); o.stop(now + n.d); now += n.d;
        });
    }

    function playSimpleDing() {
        const ctx = new AudioContext(); const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(523, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(659, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.05, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        o.start(); o.stop(ctx.currentTime + 0.3);
    }

    // 錄音模組
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            audioUrl = URL.createObjectURL(audioBlob);
            document.getElementById('playRecBtn').classList.remove('hidden');
        };
    }).catch(err => console.log("Mic delayed."));

    function startRec() { audioChunks = []; mediaRecorder.start(); document.getElementById('recording-status').style.display = 'block'; }
    function stopRec() { mediaRecorder.stop(); document.getElementById('recording-status').style.display = 'none'; }
    function playBack() { new Audio(audioUrl).play(); }
</script>
</body>
</html>
